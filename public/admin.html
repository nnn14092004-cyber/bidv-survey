<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BIDV SmartBanking Admin - Phân tích dữ liệu khảo sát">
    <title>BIDV Admin – Phân tích thông minh</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <div class="login-icon">📊</div>
        <h1>BIDV Admin – Đăng nhập</h1>
        <img src="/assets/images/logo.jpg" alt="BIDV Logo" class="login-logo" onerror="this.style.display='none'">
        <p class="login-subtitle">Hệ thống Quản trị Khảo sát</p>

        <button class="btn-google" onclick="handleGoogleLogin()" id="btnGoogleLogin">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Đăng nhập với Google
        </button>

        <div class="login-loading" id="loginLoading">⏳ Đang xác thực...</div>
        <div class="login-error" id="loginError"></div>
        <p class="login-footer">Chỉ dành cho quản trị viên được ủy quyền</p>
    </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dashboard" class="dashboard">
    <div class="container">
        <div class="header">
            <h1>📊 BIDV SmartBanking – Phân tích thông minh</h1>
            <div class="header-right">
                <div class="user-info" id="userInfo"></div>
                <div class="btn-group">
                    <button class="btn-green" onclick="exportToExcel()">📥 Xuất Excel</button>
                    <button class="btn-blue" onclick="refreshData()">🔄 Làm mới</button>
                    <button class="btn-red" onclick="confirmReset()">🗑 Reset</button>
                    <button class="btn-gray" onclick="handleLogout()">🚪 Đăng xuất</button>
                </div>
            </div>
        </div>

        <!-- Date Filter -->
        <div class="filter-bar">
            <label>📅 Từ ngày:</label>
            <input type="date" id="dateFrom">
            <label>đến:</label>
            <input type="date" id="dateTo">
            <button class="btn-blue" onclick="applyDateFilter()" style="padding:0.4rem 1rem;font-size:0.8rem">Lọc</button>
            <button class="btn-outline" onclick="clearDateFilter()" style="padding:0.4rem 1rem;font-size:0.8rem">Xóa lọc</button>
        </div>

        <div id="statsContainer">
            <div style="text-align:center;padding:3rem;color:#64748b">Đang tải dữ liệu…</div>
        </div>

        <div class="footer-note">Tự động cập nhật mỗi 30 giây | Dữ liệu theo thời gian thực</div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="/assets/js/firebase-config.js"></script>
<script src="/assets/js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDV Admin - Phân tích thông minh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { background: #f0f2f5; font-family: system-ui; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        .chart-container { height: 260px; margin-bottom: 1rem; }
        .flex-charts { display: flex; flex-wrap: wrap; gap: 1.5rem; }
        .flex-charts > div { flex: 1; min-width: 250px; }
        .insight { background: #eef2ff; border-left: 5px solid #005391; padding: 1rem; border-radius: 1rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 0.6rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
        .btn-reset { background: #dc2626; color: white; padding: 0.5rem 1rem; border-radius: 2rem; margin-left: 0.5rem; }
        .btn-reset:hover { background: #b91c1c; }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-wrap justify-between items-center mb-6 gap-3">
            <h1 class="text-2xl font-bold text-[#005391]"> BIDV SmartBanking – Phân tích thông minh</h1>
            <div class="flex gap-3">
                <button onclick="exportToExcel()" class="bg-green-700 text-white px-4 py-2 rounded-xl text-sm"> Xuất Excel</button>
                <button onclick="refreshData()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm"> Làm mới</button>
                <button onclick="confirmReset()" class="btn-reset"> Reset dữ liệu</button>
            </div>
        </div>
        <div id="statsContainer" class="space-y-6"><div class="text-center py-10"> Đang tải dữ liệu...</div></div>
        <div class="text-right text-xs text-gray-400 mt-4">Tự động cập nhật mỗi 30 giây | Dữ liệu theo thời gian thực</div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script>
        const PASSWORD = "14092004";
        const pwd = prompt(" Nhập mật khẩu quản trị:");
        if(pwd !== PASSWORD) { document.body.innerHTML = '<div class="text-center text-red-600 p-10"> Sai mật khẩu</div>'; throw new Error("Unauth"); }

        let currentData = null;
        let charts = {};

        async function fetchStats() {
            const res = await fetch('/api/admin/stats');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        }

        function destroyCharts() {
            Object.values(charts).forEach(chart => { if (chart) chart.destroy(); });
            charts = {};
        }

        // Phân tích thông minh: tìm 3 điểm mạnh nhất và 3 điểm yếu nhất
        function generateInsights(likertAvg) {
            const criteria = [
                { name: "TC1 (Ổn định hệ thống)", key: "tc1" },
                { name: "TC2 (Xử lý chính xác)", key: "tc2" },
                { name: "TC3 (Phản hồi nhanh)", key: "tc3" },
                { name: "Đáp ứng sự cố", key: "dapung1" },
                { name: "Tổng đài 24/7", key: "dapung2" },
                { name: "Bảo mật OTP/Sinh trắc", key: "bm1" },
                { name: "Bảo mật thông tin", key: "bm2" },
                { name: "Giao diện thân thiện", key: "deDung1" },
                { name: "Bố trí tính năng", key: "deDung2" },
                { name: "Giao diện hiện đại", key: "ht1" },
                { name: "Nhiều tính năng hữu ích", key: "ht2" },
                { name: "Hài lòng chung", key: "haiLong" },
                { name: "CSKH chuyên nghiệp", key: "cskh1" },
                { name: "Cập nhật tính năng mới", key: "tinhnang1" },
                { name: "Tốc độ thao tác", key: "tocdo1" },
                { name: "Hướng dẫn rõ ràng", key: "huongdan1" },
                { name: "Nhận diện khuôn mặt", key: "sinhtrac1" },
                { name: "Thông báo bảo trì", key: "baotri1" },
                { name: "Phí dịch vụ cạnh tranh", key: "phicn1" },
                { name: "Nhận diện giọng nói/vân tay", key: "nhandien1" }
            ];
            const scores = criteria.map(c => ({ name: c.name, score: likertAvg[c.key] || 0 }));
            const sorted = [...scores].sort((a,b) => b.score - a.score);
            const top3 = sorted.slice(0,3);
            const bottom3 = sorted.slice(-3).reverse();
            return { top3, bottom3 };
        }

        function renderInsights(likertAvg) {
            const { top3, bottom3 } = generateInsights(likertAvg);
            return `
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="insight">
                        <h3 class="font-bold text-green-800"> Điểm mạnh (cần phát huy)</h3>
                        <ul class="list-disc pl-5 mt-2">
                            ${top3.map(t => `<li>${t.name}: <strong>${t.score}/5</strong></li>`).join('')}
                        </ul>
                    </div>
                    <div class="insight">
                        <h3 class="font-bold text-red-800"> Điểm yếu (cần cải thiện)</h3>
                        <ul class="list-disc pl-5 mt-2">
                            ${bottom3.map(b => `<li>${b.name}: <strong>${b.score}/5</strong> – khuyến nghị ưu tiên nâng cấp</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;
        }

        function renderCharts(data) {
            const { genderCount, ageGroups, durationCount, likertAvg, timeline } = data;

            const genderCtx = document.getElementById('genderPieChart')?.getContext('2d');
            if (genderCtx) charts.gender = new Chart(genderCtx, { type: 'doughnut', data: { labels: ['Nam', 'Nữ'], datasets: [{ data: [genderCount.Nam||0, genderCount.Nữ||0], backgroundColor: ['#005391', '#00A69C'] }] }, options: { responsive: true } });

            const ageCtx = document.getElementById('agePieChart')?.getContext('2d');
            if (ageCtx) charts.age = new Chart(ageCtx, { type: 'pie', data: { labels: Object.keys(ageGroups), datasets: [{ data: Object.values(ageGroups), backgroundColor: ['#1E3A8A', '#2563EB', '#3B82F6', '#60A5FA', '#93C5FD'] }] }, options: { responsive: true } });

            const durCtx = document.getElementById('durationPieChart')?.getContext('2d');
            if (durCtx) charts.duration = new Chart(durCtx, { type: 'doughnut', data: { labels: Object.keys(durationCount), datasets: [{ data: Object.values(durationCount), backgroundColor: ['#0F766E', '#14B8A6', '#2DD4BF', '#5EEAD4'] }] }, options: { responsive: true } });

            const lineCtx = document.getElementById('trendLineChart')?.getContext('2d');
            if (lineCtx && timeline.length) {
                charts.trend = new Chart(lineCtx, { type: 'line', data: { labels: timeline.map(t=>t.date), datasets: [{ label: 'Điểm TB (1-5)', data: timeline.map(t=>t.avg), borderColor: '#005391', fill: true, tension: 0.3 }] }, options: { responsive: true, scales: { y: { min: 1, max: 5 } } } });
            } else if (lineCtx) document.getElementById('trendLineChart').parentElement.innerHTML = '<p class="text-gray-500 text-center">Chưa đủ dữ liệu theo ngày</p>';

            const barCtx = document.getElementById('avgBarChart')?.getContext('2d');
            if (barCtx) {
                const labels = ['TC1','TC2','TC3','Đáp1','Đáp2','BM1','BM2','DD1','DD2','HH1','HH2','HL','CSKH','TN','TĐ','HD','ST','BT','Phí','ND'];
                const values = [likertAvg.tc1, likertAvg.tc2, likertAvg.tc3, likertAvg.dapung1, likertAvg.dapung2, likertAvg.bm1, likertAvg.bm2, likertAvg.deDung1, likertAvg.deDung2, likertAvg.ht1, likertAvg.ht2, likertAvg.haiLong, likertAvg.cskh1, likertAvg.tinhnang1, likertAvg.tocdo1, likertAvg.huongdan1, likertAvg.sinhtrac1, likertAvg.baotri1, likertAvg.phicn1, likertAvg.nhandien1];
                charts.bar = new Chart(barCtx, { type: 'bar', data: { labels, datasets: [{ label: 'Điểm TB', data: values, backgroundColor: '#005391' }] }, options: { responsive: true, scales: { y: { min: 1, max: 5 } } } });
            }
        }

        function renderStats(data) {
            const { total, genderCount, ageGroups, durationCount, featureFreq, difficultyFreq, rawResponses, timeline, likertAvg } = data;
            let html = `
                <div class="grid md:grid-cols-4 gap-4 mb-6">
                    <div class="stat-card"><div class="text-3xl font-bold text-[#005391]">${total}</div><div> Tổng phản hồi</div></div>
                    <div class="stat-card"><div> Nam: ${genderCount.Nam||0}<br> Nữ: ${genderCount.Nữ||0}</div></div>
                    <div class="stat-card"><div class="font-semibold"> Độ tuổi</div>${Object.entries(ageGroups).map(([k,v])=>`${k}: ${v}<br>`).join('')}</div>
                    <div class="stat-card"><div class="font-semibold"> Thời gian dùng</div>${Object.entries(durationCount).map(([k,v])=>`${k}: ${v}<br>`).join('')}</div>
                </div>
                ${renderInsights(likertAvg)}
                <div class="flex-charts">
                    <div class="stat-card"><h3 class="font-bold text-center">Giới tính</h3><div class="chart-container"><canvas id="genderPieChart"></canvas></div></div>
                    <div class="stat-card"><h3 class="font-bold text-center">Độ tuổi</h3><div class="chart-container"><canvas id="agePieChart"></canvas></div></div>
                    <div class="stat-card"><h3 class="font-bold text-center">Thời gian sử dụng</h3><div class="chart-container"><canvas id="durationPieChart"></canvas></div></div>
                </div>
                <div class="stat-card">
                    <h2 class="font-bold text-lg mb-3"> Xu hướng điểm trung bình theo thời gian</h2>
                    <div class="chart-container"><canvas id="trendLineChart" height="200"></canvas></div>
                </div>
                <div class="stat-card">
                    <h2 class="font-bold text-lg mb-3"> Điểm trung bình 20 chỉ tiêu</h2>
                    <div class="chart-container"><canvas id="avgBarChart" height="250"></canvas></div>
                </div>
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="stat-card"><h2 class="font-bold"> Tính năng dùng nhiều</h2><ul class="list-disc pl-5">${Object.entries(featureFreq).map(([k,v])=>`<li>${k}: ${v}</li>`).join('')||'<li>Chưa có</li>'}</ul></div>
                    <div class="stat-card"><h2 class="font-bold"> Khó khăn gặp phải</h2><ul class="list-disc pl-5">${Object.entries(difficultyFreq).map(([k,v])=>`<li>${k}: ${v}</li>`).join('')||'<li>Chưa có</li>'}</ul></div>
                </div>
                <div class="stat-card">
                    <h2 class="font-bold text-lg mb-2"> 200 phản hồi gần nhất (có Họ tên, Ngày sinh)</h2>
                    <div class="overflow-x-auto"><table class="min-w-full"><thead><tr><th>Thời gian</th><th>Họ tên</th><th>Ngày sinh</th><th>GT</th><th>Tuổi</th><th>Điểm TB</th><th>Góp ý</th></tr></thead><tbody>
                        ${rawResponses.map(r => {
                            let totalScore=0, cnt=0;
                            ['tc1','tc2','tc3','dapung1','dapung2','bm1','bm2','deDung1','deDung2','ht1','ht2','haiLong','cskh1','tinhnang1','tocdo1','huongdan1','sinhtrac1','baotri1','phicn1','nhandien1'].forEach(k=>{if(r[k]){totalScore+=r[k];cnt++;}});
                            const avg = cnt ? (totalScore/cnt).toFixed(1) : '?';
                            return `<tr><td>${new Date(r.submittedAt).toLocaleString()}</td><td>${r.fullName||'??'}</td><td>${r.dob||'??'}</td><td>${r.gender||'?'}</td><td>${r.age||'?'}</td><td>${avg}</td><td>${(r.feedback||'').substring(0,80)}</td></tr>`;
                        }).join('')}
                    </tbody></table></div>
                </div>
            `;
            document.getElementById('statsContainer').innerHTML = html;
            renderCharts(data);
        }

        async function refreshData() {
            try {
                const data = await fetchStats();
                currentData = data;
                destroyCharts();
                renderStats(data);
            } catch(err) {
                document.getElementById('statsContainer').innerHTML = `<div class="bg-red-100 text-red-700 p-4 rounded-2xl"> Lỗi: ${err.message}</div>`;
            }
        }

        function exportToExcel() {
            if (!currentData) return alert('Chưa có dữ liệu');
            const wsData = currentData.rawResponses.map(r => ({
                'Thời gian': r.submittedAt, 'Họ tên': r.fullName, 'Ngày sinh': r.dob, 'Giới tính': r.gender, 'Tuổi': r.age,
                'Nghề nghiệp': r.job, 'TC1': r.tc1, 'TC2': r.tc2, 'TC3': r.tc3, 'Đáp ứng1': r.dapung1, 'Đáp ứng2': r.dapung2,
                'BM1': r.bm1, 'BM2': r.bm2, 'Dễ dùng1': r.deDung1, 'Dễ dùng2': r.deDung2, 'Hữu hình1': r.ht1, 'Hữu hình2': r.ht2,
                'CSKH1': r.cskh1, 'Tính năng1': r.tinhnang1, 'Tốc độ1': r.tocdo1, 'Hướng dẫn1': r.huongdan1,
                'Sinh trắc1': r.sinhtrac1, 'Bảo trì1': r.baotri1, 'Phí1': r.phicn1, 'Nhận diện1': r.nhandien1,
                'Hài lòng': r.haiLong, 'Khó khăn': (r.difficulties||[]).join(', '), 'Góp ý': r.feedback
            }));
            const ws = XLSX.utils.json_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'PhanHoi');
            XLSX.writeFile(wb, `BIDV_Survey_${new Date().toISOString().slice(0,19)}.xlsx`);
        }

        function confirmReset() {
            if (confirm(" Xóa VĨNH VIỄN tất cả dữ liệu? Không thể hoàn tác.")) {
                fetch('/api/admin/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: PASSWORD })
                }).then(res => res.json()).then(data => {
                    if (data.success) { alert(" Đã xóa!"); refreshData(); }
                    else alert(" Lỗi: " + data.message);
                }).catch(err => alert("Lỗi kết nối: " + err));
            }
        }

        refreshData();
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
